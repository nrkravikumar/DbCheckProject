<!DOCTYPE html>
<html lang="en">
<head>
  <title>Home</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style type="text/css">
    body {
      background-color: gainsboro;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <a class="navbar-brand" href="{% url 'hm' %}">CRUD</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="{% url 'hm' %}">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'lgn' %}">Login</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'reg' %}">Registration</a>
      </li>    
    </ul>
  </div>  
</nav>
<br>

<div class="container">
  <div class="jumbotron">
    <h3>CRUD Operations</h3>
  </div>
</div>
<div class="container">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="col-md-9">
        <input type="text" name="" class="form-control my-2" placeholder="Search records here....">
      </div>
      <div class="col-md-3">
        <input type="submit" value="Search" class="btn btn-success my-2 btn-block">
      </div>
    </div>
  </form>
</div>

<div class="container mt-4">
  <div class="row">
    {% for i in g %}
      <div class="col-md-3 mb-4"> 
        <div class="card h-100 shadow border-1">
          <div class="card-body">
            <h5 class="card-title text-primary font-weight-bold">
              {{ i.user }}
            </h5>
            <p class="mb-1"><strong>Full Name:</strong>
              {{ i.fname }} {{ i.lname }}
            </p>
            <p class="text-muted"><b>Email:</b> {{ i.mail }}</p>
          </div>
          <div class="card-footer bg-white text-right">
            <button class="btn btn-sm btn-secondary">
              View Profile
            </button>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
